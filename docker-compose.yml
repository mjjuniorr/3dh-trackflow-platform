services:
  frontend:
    image: ${FRONTEND_IMAGE:-3dh-trackflow-web:latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    networks:
      - PortainerRede
    depends_on:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=PortainerRede
        - traefik.http.routers.tracking-frontend.rule=Host(`track.3dhmanaus.com.br`)
        - traefik.http.routers.tracking-frontend.entrypoints=websecure
        - traefik.http.routers.tracking-frontend.tls=true
        - traefik.http.routers.tracking-frontend.tls.certresolver=letsencrypt
        - traefik.http.services.tracking-frontend.loadbalancer.server.port=80

  backend:
    image: ${BACKEND_IMAGE:-3dh-trackflow-backend:latest}
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://track.3dhmanaus.com.br}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tracking}:${POSTGRES_PASSWORD:?configure POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tracking}?schema=public
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-rastreamento}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-trackflow-backend}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-trackflow-consumer-group}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      KAFKA_SSL: ${KAFKA_SSL:-false}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?configure JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      AUTH_MODE: ${AUTH_MODE:-hybrid}
      OIDC_ISSUER: ${OIDC_ISSUER:-https://auth.3dhmanaus.com.br/realms/3dh}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-trackflow-web}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-trackflow-web}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_DEFAULT_COMPANY_ID: ${OIDC_DEFAULT_COMPANY_ID:-}
      PORTAL_URL: ${PORTAL_URL:-https://portal.3dhmanaus.com.br}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://track.3dhmanaus.com.br}
    networks:
      - PortainerRede
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tracking}
      POSTGRES_USER: ${POSTGRES_USER:-tracking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?configure POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - PortainerRede
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - PortainerRede
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  postgres_data:
  redis_data:

networks:
  PortainerRede:
    external: true
